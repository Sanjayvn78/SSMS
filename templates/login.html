<!DOCTYPE html>
<html>
<head>
    <title>COLLEGE COMPANIONS</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI';
        }

        body {
            height: 100vh;

            /* 🔥 STUDENT BACKGROUND IMAGE */
            background: url('https://images.unsplash.com/photo-1523580846011-d3a5bc25702b') no-repeat center center/cover;

            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 🔥 DARK OVERLAY */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: 0;
        }

        /* 🔥 CONTAINER (GLASS EFFECT) */
        .container {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 35px;
            width: 380px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.4);
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        h2 {
            margin-bottom: 20px;
            color: #1e3a8a;
        }

        /* ROLE BUTTONS */
        .role-btns button {
            width: 45%;
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #e0e7ff;
            font-weight: bold;
            transition: 0.3s;
        }

        .role-btns button:hover {
            background: #c7d2fe;
        }

        .active-role {
            background: #1e3a8a !important;
            color: white;
        }

        /* TOGGLE */
        .toggle {
            margin: 15px 0;
        }

        .toggle button {
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            background: #e0e7ff;
            border-radius: 5px;
            transition: 0.3s;
        }

        .toggle button:hover {
            background: #c7d2fe;
        }

        .active-toggle {
            background: #1e3a8a !important;
            color: white;
        }

        /* INPUT */
        input {
            width: 92%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        input:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 5px rgba(37,99,235,0.5);
        }

        /* BUTTON */
        button.submit-btn {
            width: 96%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            font-size: 15px;
        }

        button.submit-btn:hover {
            background: #1e40af;
        }

        /* ERROR */
        .error {
            color: red;
            margin-top: 10px;
        }

        /* FOOTER */
        .brand {
            font-size: 13px;
            color: gray;
            margin-top: 15px;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>🚀 COLLEGE COMPANIONS</h2>

    <!-- ROLE -->
    <div class="role-btns">
        <button id="studentBtn" class="active-role" onclick="selectRole('student')">
            <i class="fa fa-user"></i> Student
        </button>

        <button id="teacherBtn" onclick="selectRole('teacher')">
            <i class="fa fa-chalkboard-teacher"></i> Teacher
        </button>
    </div>

    <!-- TOGGLE -->
    <div class="toggle">
        <button id="loginTab" class="active-toggle" onclick="showLogin()">Login</button>
        <button id="signupTab" onclick="showSignup()">Sign Up</button>
    </div>

    <!-- FORM -->
    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <!-- SIGNUP FIELD -->
        <input type="password" id="confirmPassword" name="confirm_password"
               placeholder="Confirm Password" style="display:none;">

        <!-- ROLE -->
        <input type="hidden" id="role" name="role" value="student">

        <button type="submit" class="submit-btn">Login / Signup</button>
    </form>

    <!-- ERROR -->
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <div class="brand">
        Smart Student & Teacher Management System
    </div>

</div>

<script>

function selectRole(role) {
    document.getElementById("role").value = role;

    document.getElementById("studentBtn").classList.remove("active-role");
    document.getElementById("teacherBtn").classList.remove("active-role");

    if(role === "student") {
        document.getElementById("studentBtn").classList.add("active-role");
    } else {
        document.getElementById("teacherBtn").classList.add("active-role");
    }
}

function showSignup() {
    document.getElementById("confirmPassword").style.display = "block";

    document.getElementById("loginTab").classList.remove("active-toggle");
    document.getElementById("signupTab").classList.add("active-toggle");
}

function showLogin() {
    document.getElementById("confirmPassword").style.display = "none";

    document.getElementById("signupTab").classList.remove("active-toggle");
    document.getElementById("loginTab").classList.add("active-toggle");
}

</script>

</body>
</html>
