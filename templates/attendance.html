<!DOCTYPE html>
<html>
<head>
    <title>Attendance Report</title>
</head>
<body>

<h2>Student Attendance Report</h2>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Total Days</th>
        <th>Present Days</th>
        <th>Percentage</th>
    </tr>

    {% for i in data %}
    <tr>
        <td>{{ i.name }}</td>
        <td>{{ i.total }}</td>
        <td>{{ i.present }}</td>
        <td>{{ i.percentage }}%</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
