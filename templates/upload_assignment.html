<!DOCTYPE html>
<html>
<head>
    <title>Upload Assignment</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';

            /* BACKGROUND IMAGE (Teacher / Assignment related) */
            background:
                linear-gradient(rgba(10,25,49,0.85), rgba(30,58,138,0.85)),
                url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b');

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            color: white;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: rgba(11,37,69,0.9);
            position: fixed;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .sidebar h2 {
            color: #38bdf8;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: #cbd5f5;
            text-decoration: none;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #1e40af;
        }

        /* MAIN */
        .main {
            margin-left: 260px;
            padding: 20px;
        }

        /* TOPBAR */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logout {
            background: #ef4444;
            padding: 8px 15px;
            border-radius: 6px;
            text-decoration: none;
            color: white;
        }

        /* MENU */
        .menu {
            position: relative;
            cursor: pointer;
        }

        .menu i {
            font-size: 22px;
        }

        .dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 35px;
            background: white;
            color: black;
            min-width: 150px;
            border-radius: 8px;
            overflow: hidden;
        }

        .dropdown a {
            display: block;
            padding: 10px;
            text-decoration: none;
            color: black;
        }

        .dropdown a:hover {
            background: #f2f2f2;
        }

        /* FORM CARD */
        .card {
            background: rgba(19,59,92,0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            width: 350px;
            margin-top: 20px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1e40af;
        }

        /* TABLE */
        table {
            width: 100%;
            margin-top: 30px;
            background: rgba(19,59,92,0.9);
            backdrop-filter: blur(10px);
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #1d4ed8;
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #1e40af;
        }

        tr:hover {
            background: #1e40af;
        }

        .delete-btn {
            background: red;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }

    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>👨‍🏫 Teacher</h2>

    <a href="/teacher_home/">Dashboard</a>
    <a href="/upload_assignment/">Assignments</a>
    <a href="/upload_notes/">Notes</a>
    <a href="/upload_timetable/">Timetable</a>
    <a href="/manage_results/">Results</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
        <h2>📝 Upload Assignment</h2>

        <div style="display:flex; gap:15px; align-items:center;">
            <a href="/" class="logout">
                <i class="fa fa-sign-out-alt"></i> Logout
            </a>

            <!-- MENU -->
            <div class="menu">
                <i class="fa fa-bars" onclick="toggleMenu()"></i>

                <div class="dropdown" id="menuBox">
                    <a href="/teacher_home/">Dashboard</a>
                    <a href="/upload_notes/">Notes</a>
                    <a href="/upload_timetable/">Timetable</a>
                    <a href="/manage_results/">Results</a>
                </div>
            </div>
        </div>
    </div>

    <!-- FORM -->
    <div class="card">
        <form method="POST">
            {% csrf_token %}

            <input type="text" name="title" placeholder="Title" required>
            <textarea name="description" placeholder="Description" required></textarea>
            <input type="date" name="deadline" required>

            <button type="submit">Upload</button>
        </form>
    </div>

    <!-- TABLE -->
    <table>
        <tr>
            <th>Title</th>
            <th>Description</th>
            <th>Deadline</th>
            <th>Delete</th>
        </tr>

        {% for a in data %}
        <tr>
            <td>{{ a.title }}</td>
            <td>{{ a.description }}</td>
            <td>{{ a.deadline }}</td>
            <td>
                <form method="POST" action="{% url 'delete_assignment' a.id %}">
                    {% csrf_token %}
                    <button type="submit" class="delete-btn">
                        <i class="fa fa-trash"></i>
                    </button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

<script>
function toggleMenu() {
    var menu = document.getElementById("menuBox");
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}
</script>

</body>
</html>
