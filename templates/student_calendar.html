<!DOCTYPE html>
<html>
<head>
    <title>College Calendar</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .phone {
            width: 350px;
            height: 650px;
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        }

        /* TOP CALENDAR */
        .calendar-top {
            background: linear-gradient(to bottom, #ff7e5f, #ff4b2b);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .calendar-top h2 {
            margin: 10px 0;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            font-size: 12px;
            margin-top: 10px;
        }

        .dates {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin-top: 10px;
        }

        .date {
            padding: 10px;
            text-align: center;
            border-radius: 50%;
            cursor: pointer;
        }

        .date:hover {
            background: rgba(255,255,255,0.3);
        }

        .active {
            background: white;
            color: #ff4b2b;
            font-weight: bold;
        }

        /* EVENTS */
        .events {
            padding: 15px;
        }

        .event-card {
            background: #f8fafc;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            box-shadow: 0px 3px 8px rgba(0,0,0,0.1);
        }

        .event-title {
            font-weight: bold;
        }

        .event-desc {
            font-size: 13px;
            color: gray;
        }

    </style>
</head>

<body>

<div class="phone">

    <!-- CALENDAR HEADER -->
    <div class="calendar-top">
        <h3>📅 Calendar</h3>
        <h2>April 2026</h2>

        <!-- DAYS -->
        <div class="days">
            <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
        </div>

        <!-- DATES -->
        <div class="dates">
            {% for i in "123456789101112131415161718192021222324252627282930" %}
                <div class="date {% if i == '15' %}active{% endif %}">
                    {{ i }}
                </div>
            {% endfor %}
        </div>
    </div>

    <!-- EVENTS LIST -->
    <div class="events">
        <h4>📌 Events</h4>

        {% for e in events %}
        <div class="event-card">
            <div class="event-title">{{ e.title }}</div>
            <div class="event-desc">{{ e.description }}</div>
            <small>{{ e.date }}</small>
        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
