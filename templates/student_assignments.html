<!DOCTYPE html>
<html>
<head>
<title>Submit Assignment</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg,#1e3a8a,#2563eb);
    color: white;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    color: black;
    padding: 30px;
    border-radius: 15px;
    width: 400px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 10px;
    background: #2563eb;
    color: white;
    border: none;
}
</style>
</head>

<body>

<div class="container">
    <div class="card">
        <h2>Submit Assignment</h2>

        <p><b>{{ a.title }}</b></p>
        <p>{{ a.description }}</p>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <input type="text" name="name" placeholder="Your Name" required>
            <input type="file" name="file" required>

            <button>Submit</button>
        </form>
    </div>
</div>

</body>
</html>
