<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI';
        }

        body {
            display: flex;

            /* STAFF RELATED BACKGROUND IMAGE */
            background:
                linear-gradient(rgba(30,60,114,0.85), rgba(42,82,152,0.85)),
                url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f');

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            min-height: 100vh;
            color: white;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 25px;
            text-align: center;
        }

        .sidebar a {
            display: block;
            padding: 12px;
            margin: 10px 0;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }

        .active {
            background: rgba(255,255,255,0.3);
            border-left: 4px solid #00e5ff;
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
        }

        /* TOPBAR */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logout {
            background: #ff4d4d;
            padding: 8px 15px;
            border-radius: 6px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .logout:hover {
            background: #cc0000;
        }

        /* CARDS */
        .cards {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        .card {
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.3);
        }

        /* Gradient colors */
        .card:nth-child(1) { background: linear-gradient(135deg, #ff9966, #ff5e62); }
        .card:nth-child(2) { background: linear-gradient(135deg, #36d1dc, #5b86e5); }
        .card:nth-child(3) { background: linear-gradient(135deg, #00c6ff, #0072ff); }
        .card:nth-child(4) { background: linear-gradient(135deg, #f7971e, #ffd200); }

        .card:hover {
            transform: translateY(-10px) scale(1.03);
        }

        .card i {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .card h3 {
            margin-top: 10px;
        }

    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>👨‍🏫 Teacher</h2>

    <a href="/teacher_home/" class="active"><i class="fa fa-home"></i> Dashboard</a>
    <a href="/upload_assignment/"><i class="fa fa-upload"></i> Assignments</a>
    <a href="/upload_notes/"><i class="fa fa-book"></i> Notes</a>
    <a href="/upload_timetable/"><i class="fa fa-calendar"></i> Timetable</a>
    <a href="/manage_results/"><i class="fa fa-chart-line"></i> Results</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
        <h2>📊 Teacher Dashboard</h2>
        <a href="/" class="logout"><i class="fa fa-sign-out-alt"></i> Logout</a>
    </div>

    <!-- CARDS -->
    <div class="cards">

        <a href="/upload_assignment/" class="card">
            <i class="fa fa-upload"></i>
            <h3>Upload Assignment</h3>
        </a>

        <a href="/upload_notes/" class="card">
            <i class="fa fa-book"></i>
            <h3>Upload Notes</h3>
        </a>

        <a href="/upload_timetable/" class="card">
            <i class="fa fa-calendar"></i>
            <h3>Upload Timetable</h3>
        </a>

        <a href="/manage_results/" class="card">
            <i class="fa fa-chart-line"></i>
            <h3>Manage Results</h3>
        </a>

    </div>

</div>

</body>
</html>
