<!DOCTYPE html>
<html>
<head>
    <title>Student Notes</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI';
        }

        body {
            display: flex;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 230px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            padding: 12px;
            margin: 10px 0;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.2);
        }

        .sidebar a.active {
            background: rgba(255,255,255,0.3);
            font-weight: bold;
            border-left: 5px solid #00e5ff;
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* TOPBAR */
        .topbar {
            display: flex;
            justify-content: space-between;
            color: white;
        }

        .logout {
            background: #ff4d4d;
            padding: 8px 15px;
            border-radius: 6px;
            text-decoration: none;
            color: white;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        /* CARD */
        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 20px;
            color: white;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .subject {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .content {
            font-size: 14px;
            margin-bottom: 15px;
            color: #e0e0e0;
        }

        /* BUTTONS */
        .btn {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            color: white;
            font-size: 13px;
            margin-right: 10px;
        }

        .pdf {
            background: #ff4d4d;
        }

        .video {
            background: #00c6ff;
            color: black;
        }

        iframe {
            width: 100%;
            height: 200px;
            border-radius: 10px;
            margin-top: 10px;
        }

        /* EMPTY */
        .empty {
            text-align: center;
            margin-top: 100px;
            color: white;
        }

    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🎓 SSMS</h2>

    <a href="/student_home/">Dashboard</a>
    <a href="/timetable/">Timetable</a>
    <a href="/assignments/">Assignments</a>
    <a href="/notes/" class="active">Notes</a>
    <a href="/expenses/">Expenses</a>
    <a href="/results/">Results</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
        <h2>📚 Student Notes</h2>
        <a href="/" class="logout">Logout</a>
    </div>

    {% if notes %}

    <div class="grid">

        {% for n in notes %}
        <div class="card">

            <div class="subject">
                {{ n.subject }}
            </div>

            <div class="content">
                {{ n.content }}
            </div>

            {% if n.file %}
            <a href="{{ n.file.url }}" target="_blank" class="btn pdf">
                <i class="fa fa-file-pdf"></i> PDF
            </a>
            {% endif %}

            {% if n.video_link %}
            <a href="{{ n.video_link }}" target="_blank" class="btn video">
                <i class="fa fa-play"></i> Watch
            </a>

            <iframe src="{{ n.video_link|cut:'watch?v='|add:'embed/' }}"></iframe>
            {% endif %}

        </div>
        {% endfor %}

    </div>

    {% else %}

    <div class="empty">
        <i class="fa fa-folder-open fa-3x"></i>
        <h3>No Notes Available</h3>
    </div>

    {% endif %}

</div>

</body>
</html>
